definitions:
  models.CartItemInput:
    properties:
      product_id:
        type: integer
      product_size_id:
        type: integer
      quantity:
        type: integer
      variant_id:
        type: integer
    required:
    - product_id
    - product_size_id
    - quantity
    - variant_id
    type: object
  models.DiscountInput:
    properties:
      description:
        minLength: 3
        type: string
      discount_rate:
        maximum: 100
        minimum: 0
        type: integer
      flash_sale:
        type: boolean
      product_id:
        type: integer
    required:
    - description
    - discount_rate
    - product_id
    type: object
  models.ForgotPasswordInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.KategoryInput:
    properties:
      name:
        minLength: 3
        type: string
    required:
    - name
    type: object
  models.ProductImagesInput:
    properties:
      path:
        type: string
      product_id:
        type: integer
    required:
    - path
    - product_id
    type: object
  models.ProductInput:
    properties:
      description:
        minLength: 5
        type: string
      image_url:
        type: string
      kategory_id:
        type: integer
      name:
        minLength: 3
        type: string
      price:
        type: integer
    required:
    - description
    - image_url
    - kategory_id
    - name
    - price
    type: object
  models.ProductSizeInput:
    properties:
      add_price:
        minimum: 0
        type: integer
      name:
        type: string
      product_id:
        type: integer
    required:
    - name
    - product_id
    type: object
  models.ProductVariantInput:
    properties:
      add_price:
        minimum: 0
        type: integer
      product_id:
        type: integer
      temperature:
        enum:
        - hot
        - cold
        - ice
        type: string
    required:
    - product_id
    - temperature
    type: object
  models.PromoInput:
    properties:
      description:
        type: string
      discount_value:
        type: integer
      promo_type:
        enum:
        - percentage
        - nominal
        type: string
      title:
        minLength: 3
        type: string
    required:
    - description
    - discount_value
    - promo_type
    - title
    type: object
  models.ResetPasswordInput:
    properties:
      code:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - code
    - new_password
    type: object
  models.Response:
    properties:
      message:
        type: string
      result: {}
      success:
        type: boolean
    type: object
  models.ReviewsInput:
    properties:
      message:
        minLength: 3
        type: string
      product_id:
        type: integer
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - message
    - product_id
    - rating
    type: object
  models.TransactionInput:
    properties:
      address:
        minLength: 5
        type: string
      delivery_type:
        enum:
        - DineIn
        - TakeAway
        - Delivery
        type: string
      email:
        type: string
      fullname:
        minLength: 3
        type: string
      promo_id:
        type: integer
      subtotal:
        type: integer
      tax:
        minimum: 0
        type: integer
      total:
        type: integer
      user_id:
        type: integer
    required:
    - address
    - delivery_type
    - email
    - fullname
    - subtotal
    - tax
    - total
    - user_id
    type: object
  models.TransactionProductInput:
    properties:
      price_at_purchase:
        type: integer
      product_id:
        type: integer
      product_size_id:
        type: integer
      quantity:
        type: integer
      variant_id:
        type: integer
    required:
    - price_at_purchase
    - product_id
    - product_size_id
    - quantity
    - variant_id
    type: object
  models.UserLoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.UserRegisterInput:
    properties:
      email:
        type: string
      full_name:
        minLength: 3
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  models.UserUpdateInput:
    properties:
      address:
        type: string
      email:
        type: string
      full_name:
        minLength: 3
        type: string
      phone:
        type: string
    type: object
